<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeThread Florida | Coastal Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cream: '#F8F4ED', navy: '#0F1C2E', gold: '#D4AF87', teal: '#1A3C34' },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-cream text-navy font-sans">

    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gold/10 px-4 md:px-8 py-3 flex justify-between items-center">
        <a href="index.html" class="font-serif text-2xl italic text-gold">LuxeThread<br><span class="text-[9px] uppercase tracking-[0.4em] font-sans ml-1 text-navy opacity-60">Florida</span></a>
        <div class="hidden lg:flex space-x-6 uppercase text-[11px] font-semibold tracking-widest text-navy/80">
            <a href="index.html" class="text-gold border-b border-gold">Home</a>
            <a href="tshirts.html" class="hover:text-gold transition">T-Shirts</a>
            <a href="hats.html" class="hover:text-gold transition">Hats</a>
            <a href="shorts.html" class="hover:text-gold transition">Shorts</a>
            <a href="shoes.html" class="hover:text-gold transition">Shoes</a>
            <a href="combos.html" class="text-teal font-bold hover:opacity-80 transition">Combos</a>
            <a href="about.html" class="hover:text-gold transition">About</a>
            <a href="contact.html" class="hover:text-gold transition">Contact</a>
        </div>
        <div onclick="toggleCart()" class="relative cursor-pointer group">
            <svg class="w-6 h-6 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span id="cart-count" class="absolute -top-1 -right-2 bg-gold text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </nav>

    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6 md:p-10">
        
        <a href="tshirts.html" class="group relative md:col-span-2 lg:col-span-2 overflow-hidden bg-white shadow-lg aspect-[16/10]">
            <img src="images/index1.jpg" class="w-full h-full object-cover grayscale-0 group-hover:grayscale transition-all duration-1000">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/10 to-transparent p-10 flex flex-col justify-end">
                <p class="text-[10px] uppercase tracking-[0.4em] text-white/70 mb-2">Exclusive Arrival</p>
                <h2 class="font-serif text-white text-5xl italic leading-tight mb-4">The Summer Drop</h2>
                <div class="h-0.5 w-12 bg-gold mb-6 transition-all duration-500 group-hover:w-20"></div>
                <p class="text-white uppercase tracking-[0.2em] text-[10px] font-semibold flex items-center gap-2">Explore Short Sleeves 
                    <svg class="w-3 h-3 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                </p>
            </div>
        </a>

        <a href="hats.html" class="group relative overflow-hidden bg-white shadow-lg aspect-square lg:aspect-auto lg:h-full">
            <img src="images/index2.jpg" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
            <div class="absolute inset-0 bg-black/40 p-8 flex flex-col justify-end">
                <p class="text-[10px] uppercase tracking-[0.4em] text-white/70 mb-2">Summer Essentials</p>
                <h2 class="font-serif text-white text-4xl italic mb-6">Coastal Headwear</h2>
                <p class="text-white uppercase tracking-[0.2em] text-[10px] font-semibold">Shop Hats</p>
            </div>
        </a>

        <a href="shorts.html" class="group relative md:col-span-2 lg:col-span-3 overflow-hidden bg-white shadow-lg aspect-[21/9]">
            <img src="images/index3.jpg" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
            <div class="absolute inset-0 bg-black/30 p-10 flex flex-col justify-end">
                <p class="text-[10px] uppercase tracking-[0.4em] text-white/70 mb-2">Curated Looks</p>
                <h2 class="font-serif text-white text-5xl italic leading-tight mb-6">Complete The Set</h2>
                <div class="h-0.5 w-12 bg-gold mb-6 transition-all duration-500 group-hover:w-20"></div>
                <p class="text-white uppercase tracking-[0.2em] text-[10px] font-semibold flex items-center gap-2">Browse All Collections 
                    <svg class="w-3 h-3 group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                </p>
            </div>
        </a>

    </main>

    <footer class="bg-navy text-cream py-16 px-6">
        <div class="max-w-7xl mx-auto text-center border-t border-gold/20 pt-10">
            <div class="font-serif text-2xl text-gold">LuxeThread</div>
            <p class="text-[9px] uppercase tracking-[0.4em] opacity-40 mt-4">&copy; 2026 LuxeThread Florida</p>
        </div>
    </footer>

    <div id="cart-sidebar" class="fixed top-0 right-0 w-80 h-full bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-500 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="font-serif text-2xl italic">Your Bag</h2><button onclick="toggleCart()" class="text-navy transition hover:rotate-90">✕</button></div>
        <div id="cart-items" class="flex-grow space-y-4 overflow-y-auto"></div>
        <div class="border-t pt-6 mt-4"><div class="flex justify-between font-serif text-xl mb-6"><span>Total</span><span id="cart-total">$0.00</span></div><button class="w-full bg-navy text-white py-4 uppercase text-[10px] font-bold tracking-widest hover:bg-gold transition">Checkout</button></div>
    </div>

    <script>
        let cart = JSON.parse(sessionStorage.getItem('luxecart')) || [];
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            if (cart.length === 0) { itemsDiv.innerHTML = '<p class="text-center opacity-30 mt-10 italic">Empty Bag</p>'; }
            else {
                itemsDiv.innerHTML = ''; let total = 0;
                cart.forEach((item, index) => { 
                    total += item.price; 
                    itemsDiv.innerHTML += `<div class="flex justify-between items-center text-sm border-b border-gold/5 pb-2"><div><p class="font-bold uppercase tracking-tighter">${item.name}</p><p class="text-gold">$${item.price}</p></div><button onclick="removeFromCart(${index})" class="text-[9px] text-red-800 underline">Remove</button></div>`; 
                });
                totalSpan.innerText = `$${total.toFixed(2)}`;
            }
            sessionStorage.setItem('luxecart', JSON.stringify(cart));
        }
        function removeFromCart(i) { cart.splice(i, 1); updateCartUI(); }
        function toggleCart(forceOpen = null) {
            const sidebar = document.getElementById('cart-sidebar');
            if (forceOpen === true) sidebar.classList.remove('translate-x-full');
            else sidebar.classList.toggle('translate-x-full');
        }
        document.addEventListener('DOMContentLoaded', updateCartUI);
    </script>
</body>
</html>
